services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: blog-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ${POSTGRES_IMAGE:-postgres:16}
    env_file:
      - ./.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/migrations:/migrations:ro
    command: >
      sh -c "psql ${DATABASE_URL} -f /migrations/001_init.sql"
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blog-server
    env_file:
      - ./.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      SERVER_ADDR: ${SERVER_ADDR}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: blog-client
    env_file:
      - ./.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-5173}:80"

volumes:
  pgdata:
